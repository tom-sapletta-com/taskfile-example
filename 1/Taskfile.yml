        <div class="max-w-6xl mx-auto px-4 py-24 text-center"><h1 class="text-5xl font-bold mb-6">Deploy Anywhere.<br>One Config File.</h1>
        <p class="text-xl text-blue-100 mb-8 max-w-2xl mx-auto">SaaS + Desktop + Landing — generated and deployed from a single Taskfile.yml</p>
        <div class="flex justify-center gap-4"><a href="#download" class="bg-white text-blue-600 px-8 py-3 rounded-lg font-bold text-lg">Download Desktop</a>
        <a href="http://localhost:8000" class="border-2 border-white px-8 py-3 rounded-lg font-bold text-lg hover:bg-white/10">Open SaaS</a></div></div></section>
        <section class="max-w-6xl mx-auto px-4 py-16"><h2 class="text-3xl font-bold text-center mb-12">How It Works</h2>
        <div class="grid md:grid-cols-3 gap-8 text-center">
        <div class="p-6"><div class="text-4xl mb-4">1</div><h3 class="text-xl font-bold mb-2">One Taskfile.yml</h3><p class="text-gray-600">Define your entire project.</p></div>
        <div class="p-6"><div class="text-4xl mb-4">2</div><h3 class="text-xl font-bold mb-2">Aider Generates Code</h3><p class="text-gray-600">AI agent creates all apps.</p></div>
        <div class="p-6"><div class="text-4xl mb-4">3</div><h3 class="text-xl font-bold mb-2">Deploy Everywhere</h3><p class="text-gray-600">Local Docker, remote Podman, Electron.</p></div></div></section>
        <section id="download" class="bg-gray-50 py-16"><div class="max-w-6xl mx-auto px-4 text-center"><h2 class="text-3xl font-bold mb-8">Download</h2>
        <div class="grid md:grid-cols-3 gap-6 max-w-3xl mx-auto">
        <a href="#" class="bg-white rounded-lg shadow p-6 hover:shadow-lg"><div class="text-3xl mb-2">Linux</div><p class="text-sm text-gray-500">AppImage</p></a>
        <a href="#" class="bg-white rounded-lg shadow p-6 hover:shadow-lg"><div class="text-3xl mb-2">macOS</div><p class="text-sm text-gray-500">.dmg</p></a>
        <a href="#" class="bg-white rounded-lg shadow p-6 hover:shadow-lg"><div class="text-3xl mb-2">Windows</div><p class="text-sm text-gray-500">.exe</p></a></div></div></section>
