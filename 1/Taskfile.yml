# ═══════════════════════════════════════════════════════════════════════
# ONE-FILE BOOTSTRAP — This is the ONLY file you need.
#
# Equivalent of the full multi-file project, but everything is here:
#   - LLM agent prompts (inline)
#   - Port manager (inline function)
#   - Monitoring (inline function)
#   - App templates (inline heredocs)
#   - docker-compose, project.yml, .env, .gitignore (generated by setup)
#
# Usage:
#   pip install taskfile
#   taskfile run bootstrap        ← ONE COMMAND: setup + generate + dev
#
# With Aider (AI-generated code):
#   export OPENROUTER_API_KEY=sk-or-...
#   taskfile run bootstrap
# ═══════════════════════════════════════════════════════════════════════

version: "1"
name: taskfile-example
description: "Single-file bootstrap — Aider generates SaaS + Desktop + Landing, Taskfile deploys"

# ─── Configuration ─────────────────────────────────────────────────────

variables:
  PROJECT_NAME: taskfile-example
  VERSION: ${VERSION:-1.0.0}
  IMAGE_WEB: ghcr.io/tom-sapletta-com/taskfile-example-web
  IMAGE_LANDING: ghcr.io/tom-sapletta-com/taskfile-example-landing
  TAG: ${TAG:-latest}
  DOMAIN_WEB: ${DOMAIN_WEB:-app.localhost}
  DOMAIN_LANDING: ${DOMAIN_LANDING:-localhost}
  DOMAIN_API: ${DOMAIN_API:-api.localhost}
  PORT_WEB: ${PORT_WEB:-8000}
  PORT_LANDING: ${PORT_LANDING:-3000}
  PORT_TRAEFIK_WEB: ${PORT_TRAEFIK_WEB:-80}
  PORT_TRAEFIK_DASHBOARD: ${PORT_TRAEFIK_DASHBOARD:-8080}
  # LLM / Aider
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  AIDER_MODEL: ${AIDER_MODEL:-openrouter/anthropic/claude-sonnet-4}
  LLM_AGENT: ${LLM_AGENT:-aider}

# ─── Environments ──────────────────────────────────────────────────────

environments:
  local:
    container_runtime: docker
    compose_command: docker compose
    env_file: .env
    variables:
      DOMAIN_WEB: app.localhost
      DOMAIN_LANDING: localhost

  staging:
    ssh_host: ${STAGING_HOST:-staging.example.com}
    ssh_user: deploy
    ssh_key: ~/.ssh/id_ed25519
    container_runtime: podman
    service_manager: quadlet
    env_file: .env.staging
    variables:
      DOMAIN_WEB: app-staging.example.com
      DOMAIN_LANDING: staging.example.com

  prod:
    ssh_host: ${PROD_HOST:-prod.example.com}
    ssh_user: deploy
    ssh_key: ~/.ssh/id_ed25519
    container_runtime: podman
    service_manager: quadlet
    env_file: .env.prod
    variables:
      DOMAIN_WEB: app.example.com
      DOMAIN_LANDING: example.com

environment_groups:
  all-remote:
    members: [staging, prod]
    strategy: rolling
    max_parallel: 1

# ─── Embedded Functions (all inline — no external files) ───────────────

functions:
  health-check:
    lang: shell
    desc: "HTTP health check with retries, port-aware"
    code: |
      PORT_WEB="${PORT_WEB:-8000}"
      URL="${1:-http://localhost:${PORT_WEB}/health}"
      for i in $(seq 1 10); do
        if curl -sf "$URL" > /dev/null 2>&1; then
          echo "OK: $URL"; exit 0
        fi
        echo "Waiting... ($i/10)"; sleep 3
      done
      echo "FAILED: $URL"; exit 1

  notify:
    lang: python
    desc: "Send notification (Slack/stdout)"
    code: |
      import os, json, urllib.request
      webhook = os.environ.get("SLACK_WEBHOOK", "")
      msg = os.environ.get("FN_ARGS", "Task complete")
      if webhook:
          data = json.dumps({"text": f":rocket: {msg}"}).encode()
          req = urllib.request.Request(webhook, data=data,
                headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req)
      print(f"[notify] {msg}")

  port-check:
    lang: python
    desc: "Check ports, find free alternatives, save .port-state.json"
    code: |
      import socket, json, os, subprocess, sys, time
      from pathlib import Path
      PORTS = {
        "WEB": int(os.environ.get("PORT_WEB", 8000)),
        "LANDING": int(os.environ.get("PORT_LANDING", 3000)),
        "TRAEFIK_WEB": int(os.environ.get("PORT_TRAEFIK_WEB", 80)),
        "TRAEFIK_DASHBOARD": int(os.environ.get("PORT_TRAEFIK_DASHBOARD", 8080)),
      }
      def in_use(port):
          with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
              try: s.bind(("0.0.0.0", port)); return False
              except OSError: return True
      def find_free(start, end=None):
          for p in range(start, (end or start + 1000)):
              if not in_use(p): return p
          raise RuntimeError(f"No free port from {start}")
      changed = False
      for svc, port in list(PORTS.items()):
          if not in_use(port):
              print(f"  OK port {port} ({svc})")
          else:
              new = find_free(port + 1)
              print(f"  BUSY {port} ({svc}) -> {new}")
              PORTS[svc] = new
              changed = True
      Path(".port-state.json").write_text(json.dumps(PORTS, indent=2))
      for svc, port in PORTS.items():
          print(f"export PORT_{svc}={port}")
      if changed: print("PORTS_CHANGED=1")

  monitor:
    lang: python
    desc: "Full monitoring suite with latency + Slack alerts"
    code: |
      import os, sys, time, json, urllib.request, urllib.error
      port_web = os.environ.get("PORT_WEB", "8000")
      port_landing = os.environ.get("PORT_LANDING", "3000")
      endpoints = [
        ("Web (health)", f"http://localhost:{port_web}/health"),
        ("Web (API)", f"http://localhost:{port_web}/api/v1/status"),
        ("Landing", f"http://localhost:{port_landing}"),
      ]
      print("=" * 50)
      print(f"  Monitor — {time.strftime('%Y-%m-%d %H:%M:%S')}")
      print("=" * 50)
      ok = True
      for name, url in endpoints:
          try:
              t0 = time.time()
              r = urllib.request.urlopen(url, timeout=10)
              ms = (time.time() - t0) * 1000
              print(f"  OK {name:25s} {ms:.0f}ms")
          except Exception as e:
              print(f"  FAIL {name:25s} {e}")
              ok = False
      print("=" * 50)
      print("  ALL OK" if ok else "  SOME DOWN")
      webhook = os.environ.get("SLACK_WEBHOOK", "")
      if not ok and webhook:
          data = json.dumps({"text": ":red_circle: Services down"}).encode()
          try: urllib.request.urlopen(urllib.request.Request(webhook, data=data, headers={"Content-Type": "application/json"}))
          except: pass
      sys.exit(0 if ok else 1)

# ─── Pipeline ──────────────────────────────────────────────────────────

pipeline:
  branches: [main]
  secrets: [SSH_PRIVATE_KEY, OPENROUTER_API_KEY]
  stages:
    - name: generate
      tasks: [generate-all]
    - name: test
      tasks: [test]
    - name: build
      tasks: [build]
      docker_in_docker: true
    - name: deploy-staging
      tasks: [deploy]
      env: staging
    - name: deploy-prod
      tasks: [deploy]
      env: prod
      when: manual

# ═══════════════════════════════════════════════════════════════════════
# TASKS
# ═══════════════════════════════════════════════════════════════════════

tasks:

  # ─── BOOTSTRAP — one command does everything ─────────────────────

  bootstrap:
    desc: "ONE COMMAND — setup + generate + start local"
    cmds:
      - taskfile run setup
      - taskfile run generate
      - taskfile run dev

  # ─── SETUP — install aider, create venv, generate project files ──

  setup:
    desc: "Install aider + deps, create venv, generate all project files from Taskfile"
    cmds:
      # 1. Python venv
      - |
        if [ ! -d .venv ]; then
          echo "Creating venv..."
          python3 -m venv .venv
        fi
      # 2. Install aider + web deps
      - |
        if ! .venv/bin/aider --version > /dev/null 2>&1; then
          echo "Installing aider-chat..."
          .venv/bin/pip install -q aider-chat
        else
          echo "aider already installed"
        fi
      - .venv/bin/pip install -q fastapi uvicorn jinja2 python-multipart httpx pytest
      # 3. Create directories
      - mkdir -p apps/web/templates apps/web/static apps/web/tests apps/desktop apps/landing scripts .agent/prompts
      # 4. Generate .env
      - |
        if [ ! -f .env ]; then
          cat > .env << 'EOF'
        OPENROUTER_API_KEY=
        AIDER_MODEL=openrouter/anthropic/claude-sonnet-4
        PORT_WEB=8000
        PORT_LANDING=3000
        PORT_TRAEFIK_WEB=80
        PORT_TRAEFIK_DASHBOARD=8080
        DOMAIN_WEB=app.localhost
        DOMAIN_LANDING=localhost
        VERSION=1.0.0
        EOF
          echo "Created .env — set OPENROUTER_API_KEY for AI generation"
        fi
      # 5. Generate .gitignore
      - |
        cat > .gitignore << 'EOF'
        __pycache__/
        *.pyc
        .venv/
        node_modules/
        dist/
        out/
        .env
        .env.*
        *.db
        .pytest_cache/
        .port-state.json
        EOF
      # 6. Generate project.yml (what to build)
      - |
        cat > project.yml << 'EOF'
        project:
          name: taskfile-example
          description: "Multi-platform SaaS app with desktop client and landing page"
          author: tom-sapletta-com
          license: MIT
          version: "1.0.0"
        apps:
          web:
            type: saas
            framework: fastapi
            language: python
            port: 8000
            database: sqlite
            ui: htmx + tailwindcss
            features: [JWT auth, Dashboard, REST API, Health endpoint, WebSocket]
          desktop:
            type: electron
            framework: electron
            language: typescript
            platforms: [linux, macos, windows]
            features: [System tray, Auto-update, API connect, Offline mode]
          landing:
            type: static
            framework: html
            language: html+css+js
            port: 3000
            features: [Hero, Downloads, Pricing, Changelog]
        deployment:
          local: { type: docker-compose }
          remote: { type: podman-quadlet, host: vps.example.com }
          domains: { web: app.example.com, landing: example.com }
        EOF
      # 7. Generate LLM prompts
      - |
        cat > .agent/prompts/web.md << 'EOF'
        # Generate: SaaS Web Application
        ## Tech Stack
        - FastAPI (Python 3.12+), Jinja2 + TailwindCSS CDN + HTMX, SQLite (aiosqlite), JWT auth
        ## Endpoints
        1. GET /health — JSON {status, version, uptime}
        2. GET /api/v1/status — API status for desktop client
        3. GET / → redirect to dashboard
        4. GET /dashboard — main dashboard (TailwindCSS, status cards)
        5. GET /login — login page
        6. POST /api/v1/auth/login — JWT login
        7. GET /api/v1/auth/me — current user
        ## Files: main.py, requirements.txt, Dockerfile (python:3.12-slim, port 8000), templates/{dashboard,login}.html, static/, tests/test_app.py
        ## Constraints: /health must return {"status":"ok"}, TailwindCSS CDN only, responsive
        EOF
      - |
        cat > .agent/prompts/desktop.md << 'EOF'
        # Generate: Desktop Application (Electron)
        ## Tech Stack
        - Electron 28+, JavaScript + HTML/TailwindCSS, electron-builder, electron-updater
        ## Features
        1. Main window with API connection status (green/red)
        2. System tray icon (Open/Quit)
        3. Auto-check API every 10s
        4. Cross-platform: Linux (AppImage), macOS (.dmg), Windows (.exe)
        ## Files: package.json, main.js, preload.js (contextBridge), index.html (TailwindCSS CDN)
        ## Connect to http://localhost:8000/api/v1/status, contextIsolation: true
        EOF
      - |
        cat > .agent/prompts/landing.md << 'EOF'
        # Generate: Landing / Offer Page
        ## Tech Stack: Static HTML, TailwindCSS CDN, Nginx Alpine Docker
        ## Sections
        1. Hero — gradient blue→purple, CTA (Download Desktop / Open SaaS)
        2. How It Works — 3 steps: Define → Generate → Deploy
        3. Download — Linux/macOS/Windows buttons
        4. Pricing — Free/Pro($9/mo)/Enterprise
        5. Footer — GitHub link
        ## Files: index.html (single file), Dockerfile (nginx:alpine, port 80)
        ## Link SaaS to https://app.example.com, responsive
        EOF
      # 8. Generate docker-compose.yml (with env var ports)
      - |
        cat > docker-compose.yml << 'EOF'
        version: "3.8"
        services:
          web:
            build: { context: ./apps/web }
            container_name: taskfile-web
            ports: ["${PORT_WEB:-8000}:8000"]
            environment:
              - VERSION=${VERSION:-1.0.0}
              - DOMAIN_WEB=${DOMAIN_WEB:-app.localhost}
            restart: unless-stopped
            healthcheck:
              test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
              interval: 30s
              timeout: 5s
              retries: 3
          landing:
            build: { context: ./apps/landing }
            container_name: taskfile-landing
            ports: ["${PORT_LANDING:-3000}:80"]
            restart: unless-stopped
            healthcheck:
              test: ["CMD", "curl", "-sf", "http://localhost:80"]
              interval: 60s
              timeout: 5s
              retries: 3
          traefik:
            image: traefik:v2.10
            container_name: taskfile-traefik
            command: ["--api.insecure=true", "--providers.docker=true", "--entrypoints.web.address=:80"]
            ports: ["${PORT_TRAEFIK_WEB:-80}:80", "${PORT_TRAEFIK_DASHBOARD:-8080}:8080"]
            volumes: ["/var/run/docker.sock:/var/run/docker.sock:ro"]
            restart: unless-stopped
        EOF
      - echo "Setup complete. Next: taskfile run generate"

  # ─── GENERATE — aider (or inline templates) creates all code ─────

  generate:
    desc: "Generate all 3 apps (Aider if API key set, inline templates otherwise)"
    cmds:
      - taskfile run generate-web
      - taskfile run generate-desktop
      - taskfile run generate-landing
      - "@fn notify All code generated for ${PROJECT_NAME} v${VERSION}"

  generate-web:
    desc: "Generate FastAPI SaaS web app"
    tags: [generate, web]
    cmds:
      - |
        if [ -n "${OPENROUTER_API_KEY}" ]; then
          echo "Generating web app with Aider..."
          cd apps/web
          ../../.venv/bin/aider \
            --model "${AIDER_MODEL}" \
            --openai-api-key "${OPENROUTER_API_KEY}" \
            --openai-api-base "https://openrouter.ai/api/v1" \
            --yes --no-git \
            --file main.py --file requirements.txt --file Dockerfile \
            --file templates/dashboard.html --file templates/login.html \
            --file tests/test_app.py \
            --message "$(cat ../../.agent/prompts/web.md)"
        else
          echo "No OPENROUTER_API_KEY — using inline template..."
          cd apps/web
          cat > main.py << 'PYEOF'
        """FastAPI SaaS Web Application — generated by Taskfile bootstrap."""
        from fastapi import FastAPI, Request
        from fastapi.responses import HTMLResponse, JSONResponse
        from fastapi.staticfiles import StaticFiles
        from fastapi.templating import Jinja2Templates
        import os, time

        app = FastAPI(title="Taskfile Example SaaS", version=os.environ.get("VERSION", "1.0.0"))
        templates = Jinja2Templates(directory="templates")
        app.mount("/static", StaticFiles(directory="static"), name="static")
        START = time.time()

        @app.get("/health")
        async def health():
            return {"status": "ok", "version": os.environ.get("VERSION", "1.0.0"), "uptime": round(time.time() - START)}

        @app.get("/api/v1/status")
        async def api_status():
            return {"api": "v1", "status": "running", "features": ["auth", "dashboard", "websocket"]}

        @app.get("/", response_class=HTMLResponse)
        @app.get("/dashboard", response_class=HTMLResponse)
        async def dashboard(request: Request):
            return templates.TemplateResponse(request, "dashboard.html", {"title": "Dashboard", "version": os.environ.get("VERSION", "1.0.0")})

        @app.get("/login", response_class=HTMLResponse)
        async def login(request: Request):
            return templates.TemplateResponse(request, "login.html", {"title": "Login"})
        PYEOF

          cat > templates/dashboard.html << 'HTMLEOF'
        <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>{{ title }}</title><script src="https://cdn.tailwindcss.com"></script></head>
        <body class="bg-gray-50 min-h-screen"><nav class="bg-white shadow-sm border-b"><div class="max-w-5xl mx-auto px-4 py-3 flex justify-between">
        <h1 class="text-xl font-bold">Dashboard</h1><span class="text-sm text-gray-400">v{{ version }}</span></div></nav>
        <main class="max-w-5xl mx-auto p-8"><div class="grid grid-cols-3 gap-6">
        <div class="bg-white rounded-lg shadow p-6"><p class="text-sm text-gray-500">Status</p><p class="text-3xl font-bold text-green-600">Active</p></div>
        <div class="bg-white rounded-lg shadow p-6"><p class="text-sm text-gray-500">API</p><p class="text-3xl font-bold text-blue-600">v1</p></div>
        <div class="bg-white rounded-lg shadow p-6"><p class="text-sm text-gray-500">Version</p><p class="text-3xl font-bold text-purple-600">{{ version }}</p></div>
        </div><div class="mt-8 bg-white rounded-lg shadow p-6"><h2 class="font-semibold mb-3">Links</h2>
        <a href="/health" class="text-blue-600 hover:underline block">Health Check</a>
        <a href="/api/v1/status" class="text-blue-600 hover:underline block">API Status</a>
        <a href="/login" class="text-blue-600 hover:underline block">Login</a></div></main></body></html>
        HTMLEOF

          cat > templates/login.html << 'HTMLEOF'
        <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>{{ title }}</title><script src="https://cdn.tailwindcss.com"></script></head>
        <body class="bg-gray-50 min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full"><h1 class="text-2xl font-bold text-center mb-6">Sign In</h1>
        <form class="space-y-4"><div><label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" class="mt-1 w-full rounded border-gray-300 shadow-sm px-3 py-2 border" placeholder="you@example.com"></div>
        <div><label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" class="mt-1 w-full rounded border-gray-300 shadow-sm px-3 py-2 border"></div>
        <button class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Sign In</button></form></div></body></html>
        HTMLEOF

          cat > requirements.txt << 'REQEOF'
        fastapi>=0.104.0
        uvicorn[standard]>=0.24.0
        jinja2>=3.1.2
        python-multipart>=0.0.6
        httpx>=0.25.0
        pytest>=7.4.0
        REQEOF

          cat > Dockerfile << 'DKEOF'
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 8000
        CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
        DKEOF

          touch tests/__init__.py
          cat > tests/test_app.py << 'TESTEOF'
        from fastapi.testclient import TestClient
        from main import app
        client = TestClient(app)
        def test_health():
            r = client.get("/health"); assert r.status_code == 200; assert r.json()["status"] == "ok"
        def test_api():
            r = client.get("/api/v1/status"); assert r.status_code == 200
        def test_dashboard():
            r = client.get("/dashboard"); assert r.status_code == 200; assert "Dashboard" in r.text
        TESTEOF
          echo "Web app generated (inline template)"
        fi

  generate-desktop:
    desc: "Generate Electron desktop app"
    tags: [generate, desktop]
    cmds:
      - |
        if [ -n "${OPENROUTER_API_KEY}" ]; then
          echo "Generating desktop app with Aider..."
          cd apps/desktop
          ../../.venv/bin/aider \
            --model "${AIDER_MODEL}" \
            --openai-api-key "${OPENROUTER_API_KEY}" \
            --openai-api-base "https://openrouter.ai/api/v1" \
            --yes --no-git \
            --file package.json --file main.js --file preload.js --file index.html \
            --message "$(cat ../../.agent/prompts/desktop.md)"
        else
          echo "No OPENROUTER_API_KEY — using inline template..."
          cd apps/desktop
          cat > package.json << 'PKGEOF'
        {
          "name": "taskfile-example-desktop", "version": "1.0.0", "main": "main.js",
          "scripts": { "start": "electron .", "build": "electron-builder --linux --mac --win", "test": "echo Tests passed" },
          "devDependencies": { "electron": "^28.0.0", "electron-builder": "^24.9.0" },
          "build": { "appId": "com.taskfile-example.desktop", "productName": "Taskfile Example",
            "linux": {"target": ["AppImage"]}, "mac": {"target": ["dmg"]}, "win": {"target": ["nsis"]} }
        }
        PKGEOF
          cat > main.js << 'JSEOF'
        const { app, BrowserWindow, Tray, Menu } = require('electron');
        const path = require('path');
        let win, tray;
        function createWindow() {
          win = new BrowserWindow({ width: 1000, height: 700,
            webPreferences: { preload: path.join(__dirname, 'preload.js'), contextIsolation: true, nodeIntegration: false }
          });
          win.loadFile('index.html');
        }
        app.whenReady().then(createWindow);
        app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
        JSEOF
          cat > preload.js << 'PREOF'
        const { contextBridge } = require('electron');
        contextBridge.exposeInMainWorld('api', { getApiUrl: () => process.env.API_URL || 'http://localhost:8000' });
        PREOF
          cat > index.html << 'HTEOF'
        <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Taskfile Desktop</title><script src="https://cdn.tailwindcss.com"></script></head>
        <body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-8">
        <h1 class="text-4xl font-bold mb-4">Taskfile Example</h1><p class="text-gray-400 mb-8">Desktop Client</p>
        <div class="bg-gray-800 rounded-lg p-6 w-full max-w-md"><p class="text-sm text-gray-500">API Status</p>
        <p id="st" class="text-2xl font-bold text-yellow-400">Connecting...</p></div>
        <button onclick="check()" class="mt-6 bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg">Refresh</button>
        <script>const API='http://localhost:8000';
        async function check(){try{const r=await fetch(API+'/api/v1/status');const d=await r.json();
        document.getElementById('st').textContent=d.status;document.getElementById('st').className='text-2xl font-bold text-green-400';
        }catch(e){document.getElementById('st').textContent='Offline';document.getElementById('st').className='text-2xl font-bold text-red-400';}}
        check();setInterval(check,10000);</script></body></html>
        HTEOF
          echo "Desktop app generated (inline template)"
        fi

  generate-landing:
    desc: "Generate landing page"
    tags: [generate, landing]
    cmds:
      - |
        if [ -n "${OPENROUTER_API_KEY}" ]; then
          echo "Generating landing page with Aider..."
          cd apps/landing
          ../../.venv/bin/aider \
            --model "${AIDER_MODEL}" \
            --openai-api-key "${OPENROUTER_API_KEY}" \
            --openai-api-base "https://openrouter.ai/api/v1" \
            --yes --no-git \
            --file index.html --file Dockerfile \
            --message "$(cat ../../.agent/prompts/landing.md)"
        else
          echo "No OPENROUTER_API_KEY — using inline template..."
          cd apps/landing
          cat > index.html << 'LEOF'
        <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Taskfile Example</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-white">
