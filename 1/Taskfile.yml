        <div class="border rounded-lg p-6"><h3 class="font-bold">Free</h3><p class="text-3xl font-bold my-4">$0</p><p class="text-gray-600">Desktop + local deploy</p></div>
        <div class="border-2 border-blue-600 rounded-lg p-6"><h3 class="font-bold">Pro</h3><p class="text-3xl font-bold my-4">$9/mo</p><p class="text-gray-600">SaaS + remote deploy</p></div>
        <div class="border rounded-lg p-6"><h3 class="font-bold">Enterprise</h3><p class="text-3xl font-bold my-4">Custom</p><p class="text-gray-600">Fleet + support</p></div></div></div></section>
        <footer class="bg-gray-900 text-gray-400 py-8 text-center"><p>Built with <a href="https://github.com/pyfunc/taskfile" class="text-blue-400">Taskfile</a></p></footer></body></html>
        LEOF
          cat > Dockerfile << 'DKEOF'
        FROM nginx:alpine
        COPY index.html /usr/share/nginx/html/index.html
        EXPOSE 80
        DKEOF
          echo "Landing page generated (inline template)"
        fi

  generate-all:
    desc: "Alias for generate (parallel deps)"
    deps: [generate-web, generate-desktop, generate-landing]
    parallel: true
    tags: [generate]

  # ─── Testing ──────────────────────────────────────────────────────

  test:
    desc: "Run all tests"
    tags: [test, ci]
    timeout: 120
    cmds:
      - cd apps/web && ../../.venv/bin/python -m pytest tests/ -v

  # ─── Build ────────────────────────────────────────────────────────

  build:
    desc: "Build all Docker images"
    tags: [build, ci]
    cmds:
      - docker build -t ${IMAGE_WEB}:${TAG} apps/web/
      - docker build -t ${IMAGE_LANDING}:${TAG} apps/landing/
      - echo "Images built"

  # ─── Local Dev ────────────────────────────────────────────────────

  dev:
    desc: "Start locally (docker compose) with port management"
    env: [local]
    tags: [dev]
    cmds:
      - |
        # Check ports and find alternatives if busy
        @fn port-check
        if [ -f .port-state.json ]; then
          PORT_WEB=$(python3 -c "import json; print(json.load(open('.port-state.json'))['WEB'])")
          PORT_LANDING=$(python3 -c "import json; print(json.load(open('.port-state.json'))['LANDING'])")
          export PORT_WEB PORT_LANDING
        fi
        docker compose up -d --build
      - |
        if [ -f .port-state.json ]; then
          PORT_WEB=$(python3 -c "import json; print(json.load(open('.port-state.json'))['WEB'])")
          PORT_LANDING=$(python3 -c "import json; print(json.load(open('.port-state.json'))['LANDING'])")
        else
          PORT_WEB=${PORT_WEB:-8000}
          PORT_LANDING=${PORT_LANDING:-3000}
        fi
        echo ""
        echo "Web app   -> http://localhost:${PORT_WEB}"
        echo "Landing   -> http://localhost:${PORT_LANDING}"
        echo "Dashboard -> http://localhost:${PORT_WEB}/dashboard"

  dev-web:
    desc: "Start web app with hot reload (no Docker)"
    env: [local]
    tags: [dev, web]
    cmds:
      - |
        if [ -f .port-state.json ]; then
          PORT_WEB=$(python3 -c "import json; print(json.load(open('.port-state.json'))['WEB'])")
        else
          PORT_WEB=${PORT_WEB:-8000}
        fi
        cd apps/web && ../../.venv/bin/uvicorn main:app --reload --host 0.0.0.0 --port ${PORT_WEB}

  dev-landing:
    desc: "Start landing page locally"
    env: [local]
    tags: [dev, landing]
    cmds:
      - |
        if [ -f .port-state.json ]; then
          PORT_LANDING=$(python3 -c "import json; print(json.load(open('.port-state.json'))['LANDING'])")
        else
          PORT_LANDING=${PORT_LANDING:-3000}
        fi
        cd apps/landing && python -m http.server ${PORT_LANDING}

  # ─── Deploy ───────────────────────────────────────────────────────

  deploy:
    desc: "Deploy to current environment"
    env: [staging, prod]
    tags: [deploy]
    retries: 2
    retry_delay: 10
    timeout: 300
    cmds:
      - "@remote podman pull ${IMAGE_WEB}:${TAG}"
      - "@remote podman pull ${IMAGE_LANDING}:${TAG}"
      - "@remote systemctl --user restart taskfile-web.service 2>/dev/null || podman run -d --name taskfile-web --replace -p 8000:8000 ${IMAGE_WEB}:${TAG}"
      - "@remote systemctl --user restart taskfile-landing.service 2>/dev/null || podman run -d --name taskfile-landing --replace -p 3000:80 ${IMAGE_LANDING}:${TAG}"
      - "@fn health-check http://${DOMAIN_WEB}/health"
      - "@fn notify Deployed ${VERSION} to ${DOMAIN_WEB}"

  # ─── Release ──────────────────────────────────────────────────────

  release:
    desc: "Full pipeline: test -> build -> deploy staging"
    tags: [release]
    cmds:
      - taskfile run test
      - taskfile run build
      - taskfile --env staging run deploy
      - "@fn notify Release ${VERSION} deployed to staging"

  release-prod:
    desc: "Promote staging to production"
    tags: [release]
    cmds:
      - taskfile --env prod run deploy
      - "@fn notify Release ${VERSION} LIVE in production"

  # ─── Monitoring ───────────────────────────────────────────────────

  status:
    desc: "Health check all services (port-aware)"
    tags: [monitoring]
    cmds:
      - |
        if [ -f .port-state.json ]; then
          PORT_WEB=$(python3 -c "import json; print(json.load(open('.port-state.json'))['WEB'])")
          PORT_LANDING=$(python3 -c "import json; print(json.load(open('.port-state.json'))['LANDING'])")
        else
          PORT_WEB=${PORT_WEB:-8000}
          PORT_LANDING=${PORT_LANDING:-3000}
        fi
        @fn health-check http://localhost:${PORT_WEB}/health
        @fn health-check http://localhost:${PORT_LANDING}

  monitor:
    desc: "Full monitoring suite with latency"
    tags: [monitoring]
    cmds:
      - "@fn monitor"

  logs-web:
    desc: "View web app logs"
    env: [staging, prod]
    tags: [monitoring, web]
    cmds:
      - "@remote podman logs -f --tail 100 taskfile-web"

  logs-landing:
    desc: "View landing page logs"
    env: [staging, prod]
    tags: [monitoring, landing]
    cmds:
      - "@remote podman logs -f --tail 100 taskfile-landing"

  # ─── Cleanup ──────────────────────────────────────────────────────

  clean:
    desc: "Remove all generated code and containers — back to 1 file"
    cmds:
      - docker compose down -v 2>/dev/null || true
      - docker rmi ${IMAGE_WEB}:${TAG} ${IMAGE_LANDING}:${TAG} 2>/dev/null || true
      - rm -rf apps/ scripts/ .agent/ .venv/ docker-compose.yml project.yml .gitignore .env .port-state.json
      - echo "Cleaned — only Taskfile.yml + README.md remain"
